<div class="notif-wrap">
  <!-- Bell Button with count badge -->
  <button class="notif-btn" (click)="toggle()" [class.has-unread]="svc.unreadCount() > 0" title="Notifications">
    <i class="bi bi-bell{{ svc.unreadCount() > 0 ? '-fill' : '' }}"></i>
    <span class="notif-count" *ngIf="svc.unreadCount() > 0">
      {{ svc.unreadCount() > 9 ? '9+' : svc.unreadCount() }}
    </span>
  </button>

  <!-- Dropdown Panel -->
  <div class="notif-panel" *ngIf="isOpen">

    <div class="np-header">
      <span class="np-title">
        Notifications
        <span class="np-unread-chip" *ngIf="svc.unreadCount() > 0">
          {{ svc.unreadCount() }} new
        </span>
      </span>
      <div class="np-actions">
        <button class="np-action-btn" (click)="markAllRead()" *ngIf="svc.unreadCount() > 0" title="Mark all read">
          <i class="bi bi-check2-all"></i>All read
        </button>
        <button class="np-action-btn danger" (click)="clearAll()" *ngIf="svc.notifications().length > 0" title="Clear all">
          <i class="bi bi-trash3"></i>
        </button>
      </div>
    </div>

    <!-- Empty -->
    <div class="np-empty" *ngIf="svc.notifications().length === 0">
      <i class="bi bi-bell-slash"></i>
      <p>You're all caught up!</p>
    </div>

    <!-- List -->
    <div class="np-list" *ngIf="svc.notifications().length > 0">
      <div *ngFor="let n of svc.notifications()"
           class="np-item" [class.unread]="!n.read"
           (click)="onNotifClick(n)">
        <div class="np-icon"
             [style.color]="svc.getTypeColor(n.type)"
             [style.background]="svc.getTypeColor(n.type) + '18'">
          <i class="bi {{ svc.getTypeIcon(n.type) }}"></i>
        </div>
        <div class="np-content">
          <div class="np-item-title">{{ n.title }}</div>
          <div class="np-item-msg">{{ n.message }}</div>
          <div class="np-time">{{ svc.timeAgo(n.createdAt) }}</div>
        </div>
        <div class="np-item-actions">
          <div class="unread-dot" *ngIf="!n.read"></div>
          <button class="np-remove" (click)="remove($event, n.id)" title="Dismiss">
            <i class="bi bi-x"></i>
          </button>
        </div>
      </div>
    </div>

    <div class="np-footer" *ngIf="svc.notifications().length > 0">
      <button (click)="markAllRead()">Mark all as read</button>
    </div>

  </div>
</div>

<!-- Mobile Overlay -->
<div class="sidebar-overlay" *ngIf="mobileOpen" (click)="closeMobile()"></div>

<aside class="ims-sidebar" [class.collapsed]="collapsed" [class.mobile-open]="mobileOpen">

  <!-- ── Brand / Logo ────────────────────────────────────────────────────── -->
  <div class="sidebar-brand">
    <div class="brand-icon"><i class="bi bi-boxes"></i></div>
    <div class="brand-text" *ngIf="!collapsed">
      <span class="brand-name">Inventra</span>
      <span class="brand-portal">{{ getPortalLabel() }}</span>
    </div>
    <button class="mobile-close-btn" (click)="closeMobile()" *ngIf="mobileOpen">
      <i class="bi bi-x-lg"></i>
    </button>
  </div>

  <!-- ── Scrollable Navigation ───────────────────────────────────────────── -->
  <nav class="sidebar-nav">
    <ng-container *ngFor="let section of navSections()">
      <div class="nav-section-label" *ngIf="!collapsed && section.label">{{ section.label }}</div>
      <a *ngFor="let item of section.items"
         [routerLink]="item.route"
         routerLinkActive="active"
         class="nav-item"
         [title]="collapsed ? item.label : ''"
         (click)="closeMobile()">
        <i class="bi {{ item.icon }} nav-icon"></i>
        <span class="nav-label" *ngIf="!collapsed">{{ item.label }}</span>
        <span class="nav-badge" *ngIf="item.badge && !collapsed">{{ item.badge }}</span>
      </a>
    </ng-container>
  </nav>

  <!-- ── Profile + Logout (bottom) ─────────────────────────────────────── -->
  <div class="sidebar-bottom">
    <div class="sidebar-divider"></div>

    <div class="sidebar-profile-area" (click)="$event.stopPropagation()">

      <!-- Profile popup (shown on click) -->
      <div class="profile-popup" *ngIf="showProfilePopup && !collapsed">
        <div class="pp-row">
          <i class="bi bi-person-circle me-2"></i>
          <span>{{ auth.currentUser()?.name }}</span>
        </div>
        <div class="pp-row">
          <i class="bi bi-envelope me-2"></i>
          <span>{{ auth.currentUser()?.email }}</span>
        </div>
        <div class="pp-row">
          <span class="pp-role-badge" [style.background]="getRoleBadgeColor() + '22'" [style.color]="getRoleBadgeColor()">
            {{ auth.getRole() }}
          </span>
        </div>
      </div>

      <!-- Profile row -->
      <div class="profile-row" (click)="showProfilePopup = !showProfilePopup">
        <!-- Avatar -->
        <div class="profile-avatar" [style.background]="getRoleGradient()">
          {{ (auth.currentUser()?.name ?? 'U')[0].toUpperCase() }}
        </div>

        <!-- Info (visible when not collapsed) -->
        <div class="profile-info" *ngIf="!collapsed">
          <div class="profile-name">{{ auth.currentUser()?.name }}</div>
          <div class="profile-email">{{ auth.currentUser()?.email }}</div>
        </div>

        <!-- Expand chevron -->
        <i class="bi bi-chevron-up profile-chevron" *ngIf="!collapsed"
           [class.rotated]="!showProfilePopup"></i>
      </div>

      <!-- Logout button -->
      <button class="logout-btn" (click)="logout()" [title]="collapsed ? 'Sign Out' : ''">
        <i class="bi bi-box-arrow-right logout-icon"></i>
        <span *ngIf="!collapsed">Sign Out</span>
      </button>

    </div>
  </div>

</aside>

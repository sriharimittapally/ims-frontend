<header class="ims-topbar">
  <div class="topbar-left">
    <button class="toggle-btn" (click)="toggleSidebar.emit()" title="Toggle Sidebar">
      <i class="bi bi-list"></i>
    </button>
    <div class="breadcrumb-title">{{ pageTitle }}</div>
  </div>

  <div class="topbar-right">
    <!-- Theme Toggle -->
    <button class="icon-btn" (click)="theme.toggle()" [title]="theme.isDark() ? 'Switch to Light Mode' : 'Switch to Dark Mode'">
      <i class="bi" [class.bi-sun-fill]="theme.isDark()" [class.bi-moon-fill]="!theme.isDark()"></i>
    </button>

    <!-- Notification Bell -->
    <app-notification-bell />
  </div>
</header>

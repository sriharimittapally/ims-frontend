<div class="login-card ims-card">
  <!-- Header -->
  <div class="login-header">
    <div class="login-logo">
      <i class="bi bi-boxes"></i>
    </div>
    <h2>Welcome Back</h2>
    <p class="text-muted">Sign in to your IMS account</p>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <!-- Email -->
    <div class="form-group">
      <label class="ims-form-label">Email Address</label>
      <div class="input-wrap">
        <i class="bi bi-envelope input-icon"></i>
        <input
          type="email"
          class="ims-form-control with-icon"
          formControlName="email"
          placeholder="you@company.com"
          [class.is-invalid]="email.invalid && email.touched">
      </div>
      <div class="invalid-feedback d-block" *ngIf="email.invalid && email.touched">
        <span *ngIf="email.errors?.['required']">Email is required.</span>
        <span *ngIf="email.errors?.['email']">Enter a valid email address.</span>
      </div>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label class="ims-form-label">Password</label>
      <div class="input-wrap">
        <i class="bi bi-lock input-icon"></i>
        <input
          [type]="showPassword ? 'text' : 'password'"
          class="ims-form-control with-icon with-icon-right"
          formControlName="password"
          placeholder="••••••••"
          [class.is-invalid]="password.invalid && password.touched">
        <button type="button" class="password-toggle" (click)="showPassword = !showPassword">
          <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
        </button>
      </div>
      <div class="invalid-feedback d-block" *ngIf="password.invalid && password.touched">Password is required.</div>
    </div>

    <!-- Submit -->
    <button type="submit" class="btn-ims-primary btn w-100 mt-2" [disabled]="loading">
      <span *ngIf="!loading"><i class="bi bi-box-arrow-in-right me-2"></i>Sign In</span>
      <span *ngIf="loading"><span class="spinner-border spinner-border-sm me-2"></span>Signing in...</span>
    </button>
  </form>

  <!-- Register Link -->
  <div class="login-footer">
    <span class="text-muted">New supplier?</span>
    <a routerLink="/auth/register" class="register-link">Register here</a>
  </div>
</div>

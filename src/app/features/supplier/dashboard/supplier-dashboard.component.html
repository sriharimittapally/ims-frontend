<div class="animate-fade-in-up">
  <div class="page-header d-flex align-items-center justify-content-between">
    <div>
      <h1 class="page-title">Dashboard</h1>
      <p class="page-subtitle" *ngIf="dashboard">{{ dashboard.companyName }} — Welcome back!</p>
    </div>
    <a routerLink="/supplier/purchase-orders" class="btn-ims-primary btn">
      <i class="bi bi-cart-check me-1"></i> View POs
    </a>
  </div>

  <div class="page-loader" *ngIf="loading"><div class="spinner-border"></div></div>

  <ng-container *ngIf="!loading && dashboard">

    <!-- KPI Stats -->
    <div class="row g-3 mb-4">
      <div class="col-md-2 col-6">
        <app-stats-card
          label="Linked Products"
          [value]="dashboard.linkedProducts"
          icon="bi-box-seam-fill"
          color="primary" />
      </div>
      <div class="col-md-2 col-6">
        <app-stats-card
          label="Total POs"
          [value]="dashboard.totalPOs"
          icon="bi-cart-check-fill"
          color="info" />
      </div>
      <div class="col-md-2 col-6">
        <app-stats-card
          label="Pending"
          [value]="dashboard.pendingPOs"
          icon="bi-clock-history"
          color="warning" />
      </div>
      <div class="col-md-2 col-6">
        <app-stats-card
          label="Accepted"
          [value]="dashboard.acceptedPOs"
          icon="bi-check-circle-fill"
          color="success" />
      </div>
      <div class="col-md-2 col-6">
        <app-stats-card
          label="Shipped"
          [value]="dashboard.shippedPOs"
          icon="bi-truck"
          color="secondary" />
      </div>
    </div>

    <!-- Quick Action Cards -->
    <div class="row g-3">
      <div class="col-md-4">
        <a routerLink="/supplier/my-products" class="quick-action-card ims-card text-decoration-none">
          <div class="qa-icon gradient-primary"><i class="bi bi-box-seam"></i></div>
          <div class="qa-body">
            <div class="qa-title">My Products</div>
            <div class="qa-sub">Manage linked products and pricing</div>
          </div>
          <i class="bi bi-arrow-right qa-arrow"></i>
        </a>
      </div>

      <div class="col-md-4">
        <a routerLink="/supplier/purchase-orders" class="quick-action-card ims-card text-decoration-none">
          <div class="qa-icon gradient-success"><i class="bi bi-cart-check"></i></div>
          <div class="qa-body">
            <div class="qa-title">Purchase Orders</div>
            <div class="qa-sub">
              <span *ngIf="dashboard.pendingPOs > 0" class="text-warning fw-600">
                {{ dashboard.pendingPOs }} awaiting action
              </span>
              <span *ngIf="dashboard.pendingPOs === 0" class="text-muted">All orders up to date</span>
            </div>
          </div>
          <i class="bi bi-arrow-right qa-arrow"></i>
        </a>
      </div>

      <div class="col-md-4">
        <a routerLink="/supplier/reports" class="quick-action-card ims-card text-decoration-none">
          <div class="qa-icon gradient-info"><i class="bi bi-bar-chart-line"></i></div>
          <div class="qa-body">
            <div class="qa-title">Reports</div>
            <div class="qa-sub">PO history and performance</div>
          </div>
          <i class="bi bi-arrow-right qa-arrow"></i>
        </a>
      </div>

      <div class="col-md-4">
        <a routerLink="/supplier/profile" class="quick-action-card ims-card text-decoration-none">
          <div class="qa-icon gradient-warning"><i class="bi bi-person-circle"></i></div>
          <div class="qa-body">
            <div class="qa-title">My Profile</div>
            <div class="qa-sub">View company details and categories</div>
          </div>
          <i class="bi bi-arrow-right qa-arrow"></i>
        </a>
      </div>
    </div>

  </ng-container>
</div>
